<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>obras — Pati Sayuri</title>
  <link href="https://fonts.googleapis.com/css2?family=Tilt+Warp&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #F7F5F0;
      font-family: 'Tilt Warp', cursive;
      color: #3D2B1A;
    }
    header {
      padding: 32px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nome {
      font-size: 22px;
      color: #000;
      text-decoration: none;
    }
    .secao-titulo {
      font-size: 28px;
      margin-bottom: 24px;
      padding: 0 40px;
    }
    .obras-titulo { color: #e57fbd; }
    .performances-titulo { color: #a7db8a; }
    .grade {
      padding: 0 40px 60px;
      columns: 3;
      column-gap: 12px;
    }
    .grade img {
      width: 100%;
      display: block;
      margin-bottom: 12px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .grade img:hover { opacity: 0.85; }
    .separador {
      height: 1px;
      background: #D8CFC4;
      margin: 48px 40px;
    }
    /* lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(247,245,240,0.95);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .lightbox.ativo { display: flex; }
    .lightbox img {
      max-height: 80vh;
      max-width: 90vw;
      object-fit: contain;
    }
    .lightbox-fechar {
      position: absolute;
      top: 24px;
      right: 32px;
      font-size: 28px;
      cursor: pointer;
      color: #3D2B1A;
      text-decoration: none;
    }
    @media (max-width: 768px) {
      .grade { columns: 2; }
    }
    @media (max-width: 480px) {
      .grade { columns: 1; padding: 0 20px 40px; }
      header { padding: 24px 20px; }
      .secao-titulo { padding: 0 20px; }
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="nome">pati sayuri</a>
  </header>

  <div class="secao-titulo obras-titulo">obras</div>
  <div class="grade" id="grade-obras">
    <img src="1_paisagem_macia.jpg" onclick="abrirLightbox(this)">
    <img src="2_paisagem_crua.jpg" onclick="abrirLightbox(this)">
    <img src="3_senhora_sol.jpg" onclick="abrirLightbox(this)">
    <img src="4_fortuna.jpg" onclick="abrirLightbox(this)">
    <img src="5_5_amarras.jpg" onclick="abrirLightbox(this)">
    <img src="6_mixirica_com_mochi.jpg" onclick="abrirLightbox(this)">
    <img src="7_10_mochis.jpg" onclick="abrirLightbox(this)">
    <img src="8_sacola.jpg" onclick="abrirLightbox(this)">
    <img src="9_casquinha_i.jpg" onclick="abrirLightbox(this)">
    <img src="10_casquinha_vii.jpg" onclick="abrirLightbox(this)">
    <img src="11_casquinha_xi.jpg" onclick="abrirLightbox(this)">
    <img src="12_estudo_para_casca_de_mexerica.jpg" onclick="abrirLightbox(this)">
    <img src="13_estudo_para_casca_em_textil_ii.jpg" onclick="abrirLightbox(this)">
    <img src="14_estudo_para_casca_em_textil_iv.jpg" onclick="abrirLightbox(this)">
    <img src="15_chororo.jpg" onclick="abrirLightbox(this)">
    <img src="16_prova_do_real.jpg" onclick="abrirLightbox(this)">
    <img src="17_amor_furioso.jpg" onclick="abrirLightbox(this)">
    <img src="18_minha_pedra_macia.jpg" onclick="abrirLightbox(this)">
    <img src="19_mochi.jpg" onclick="abrirLightbox(this)">
    <img src="20_13_mochis.jpg" onclick="abrirLightbox(this)">
  </div>

  <div class="separador"></div>

  <div class="secao-titulo performances-titulo">performances</div>
  <div class="grade" id="grade-performances">
    <!-- adiciona fotos de performances aqui depois -->
  </div>

  <div class="lightbox" id="lightbox">
    <a class="lightbox-fechar" onclick="fecharLightbox()">✕</a>
    <img id="lightbox-img" src="">
  </div>

  <script>
    function abrirLightbox(img) {
      document.getElementById('lightbox-img').src = img.src;
      document.getElementById('lightbox').classList.add('ativo');
    }
    function fecharLightbox() {
      document.getElementById('lightbox').classList.remove('ativo');
    }
    document.getElementById('lightbox').addEventListener('click', function(e) {
      if (e.target === this) fecharLightbox();
    });
  </script>

</body>
</html>
