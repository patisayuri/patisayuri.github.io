<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>obras — Pati Sayuri</title>
  <link href="https://fonts.googleapis.com/css2?family=Tilt+Warp&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Tilt Warp', cursive;
      height: 100vh;
      overflow: hidden;
      /* Fundo com a parede do seu ateliê */
      background-image: url('obra_00_vazio2.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }
    .nome {
      position: fixed;
      top: 32px;
      left: 40px;
      font-size: 22px;
      color: #000;
      text-decoration: none;
      z-index: 10;
    }
    .secao-label {
      position: fixed;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      color: #e57fbd;
      z-index: 10;
    }
    .contador {
      position: fixed;
      top: 32px;
      right: 40px;
      font-size: 14px;
      color: #3D2B1A;
      opacity: 0.6;
      z-index: 10;
    }
    .obra-container {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .obra-img {
      max-height: 75vh;
      max-width: 70vw;
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.5s ease;
      
      /* EFEITO DE FUSÃO: Faz o branco da foto sumir e mantém a sombra real */
      mix-blend-mode: multiply; 
      /* Ajuste fino para limpar o fundo das fotos originais */
      filter: brightness(1.08) contrast(1.1);
    }
    .obra-img.visivel { opacity: 1; }
    .btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 32px;
      cursor: pointer;
      color: #3D2B1A;
      opacity: 0.4;
      transition: opacity 0.2s;
      font-family: 'Tilt Warp', cursive;
      z-index: 10;
      padding: 20px;
    }
    .btn:hover { opacity: 1; }
    .btn-prev { left: 16px; }
    .btn-next { right: 16px; }
    .obra-titulo {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: #3D2B1A;
      opacity: 0;
      transition: opacity 0.5s ease;
      text-align: center;
      white-space: nowrap;
    }
    .obra-titulo.visivel { opacity: 0.7; }
  </style>
</head>
<body>

  <a href="index.html" class="nome">pati sayuri</a>
  <div class="secao-label">obras</div>
  <div class="contador" id="contador">1 / 20</div>

  <div class="obra-container">
    <img class="obra-img" id="obra-img" src="">
  </div>

  <div class="obra-titulo" id="obra-titulo"></div>

  <button class="btn btn-prev" onclick="mudar(-1)">←</button>
  <button class="btn btn-next" onclick="mudar(1)">→</button>

  <script>
    const obras = [
      { src: '1_paisagem_macia.jpg', titulo: 'Paisagem Macia', mostrarTitulo: true },
      { src: '2_paisagem_crua.jpg', titulo: 'Paisagem Crua', mostrarTitulo: false },
      { src: '3_senhora_sol.jpg', titulo: 'Senhora Sol! Não Desapareça!', mostrarTitulo: true },
      { src: '4_fortuna.jpg', titulo: 'Fortuna', mostrarTitulo: false },
      { src: '5_5_amarras.jpg', titulo: '5 Amarras', mostrarTitulo: false },
      { src: '6_mixirica_com_mochi.jpg', titulo: 'Mixirica com Mochi', mostrarTitulo: true },
      { src: '7_10_mochis.jpg', titulo: '10 Mochis', mostrarTitulo: false },
      { src: '8_sacola.jpg', titulo: 'Sacola (Quilt itinerante)', mostrarTitulo: true },
      { src: '9_casquinha_i.jpg', titulo: 'Casquinha I', mostrarTitulo: false },
      { src: '10_casquinha_vii.jpg', titulo: 'Casquinha VII', mostrarTitulo: false },
      { src: '11_casquinha_xi.jpg', titulo: 'Casquinha XI', mostrarTitulo: false },
      { src: '12_estudo_para_casca_de_mexerica.jpg', titulo: 'Estudo para Casca de Mexerica', mostrarTitulo: false },
      { src: '13_estudo_para_casca_em_textil_ii.jpg', titulo: 'Estudo para Casca em Têxtil II', mostrarTitulo: false },
      { src: '14_estudo_para_casca_em_textil_iv.jpg', titulo: 'Estudo para Casca em Têxtil IV', mostrarTitulo: false },
      { src: '15_chororo.jpg', titulo: 'Chororo', mostrarTitulo: false },
      { src: '16_prova_do_real.jpg', titulo: 'Prova do Real', mostrarTitulo: false },
      { src: '17_amor_furioso.jpg', titulo: 'Amor Furioso', mostrarTitulo: false },
      { src: '18_minha_pedra_macia.jpg', titulo: 'Minha Pedra Macia', mostrarTitulo: false },
      { src: '19_mochi.jpg', titulo: 'Mochi', mostrarTitulo: false },
      { src: '20_13_mochis.jpg', titulo: '13 Mochis', mostrarTitulo: false },
    ];

    let atual = 0;

    function mostrar(index) {
      const img = document.getElementById('obra-img');
      const titulo = document.getElementById('obra-titulo');
      const contador = document.getElementById('contador');

      img.classList.remove('visivel');
      titulo.classList.remove('visivel');

      setTimeout(() => {
        img.src = obras[index].src;
        // Só exibe o texto se mostrarTitulo for verdadeiro
        titulo.textContent = obras[index].mostrarTitulo ? obras[index].titulo : "";
        contador.textContent = (index + 1) + ' / ' + obras.length;
        img.onload = () => {
          img.classList.add('visivel');
          if(obras[index].mostrarTitulo) {
            titulo.classList.add('visivel');
          }
        };
      }, 300);
    }

    function mudar(direcao) {
      atual = (atual + direcao + obras.length) % obras.length;
      mostrar(atual);
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') mudar(1);
      if (e.key === 'ArrowLeft') mudar(-1);
    });

    mostrar(0);
  </script>

</body>
</html>
