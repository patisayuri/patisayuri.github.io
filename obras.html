<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>obras — Pati Sayuri</title>
  <link href="https://fonts.googleapis.com/css2?family=Tilt+Warp&family=DM+Sans:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Tilt Warp', cursive;
      height: 100vh;
      overflow: hidden;
      background-image: url('obra_00_vazio2.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }
    .nome {
      position: fixed;
      top: 32px;
      left: 40px;
      font-size: 22px;
      color: #000;
      text-decoration: none;
      z-index: 10;
    }
    .secao-label {
      position: fixed;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      color: #e57fbd;
      z-index: 10;
    }
    .contador {
      position: fixed;
      top: 32px;
      right: 40px;
      font-size: 14px;
      color: #3D2B1A;
      opacity: 0.6;
      z-index: 10;
      font-family: 'DM Sans', sans-serif;
    }
    .obra-container {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }
    .obra-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 200px;
      min-height: 200px;
    }
    .obra-img {
      max-height: 85vh;
      max-width: 75vw;
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.5s ease;
      display: block;
      position: relative;
      z-index: 2;
    }
    .obra-img.visivel { opacity: 1; }
    .obra-info {
      position: absolute;
      inset: 0;
      background: rgba(247, 245, 240, 0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
      padding: 2rem;
      text-align: center;
      z-index: 3;
    }
    .obra-wrapper:hover .obra-info { opacity: 1; }
    .obra-info .titulo {
      font-family: 'DM Sans', sans-serif;
      font-style: italic;
      font-size: 18px;
      font-weight: 400;
      color: #3D2B1A;
      margin-bottom: 4px;
    }
    .obra-info .ano {
      font-family: 'DM Sans', sans-serif;
      font-size: 18px;
      font-weight: 300;
      color: #3D2B1A;
      margin-bottom: 12px;
    }
    .obra-info .descricao {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 300;
      color: #5c5b55;
      line-height: 1.6;
      max-width: 320px;
      white-space: pre-line;
    }
    .btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: #e57fbd;
      opacity: 0.5;
      transition: opacity 0.2s;
      font-family: 'Tilt Warp', cursive;
      z-index: 10;
      padding: 20px;
    }
    .btn:hover { opacity: 1; }
    .btn-prev { left: 16px; }
    .btn-next { right: 16px; }
  </style>
</head>
<body>

  <a href="index.html" class="nome">pati sayuri</a>
  <div class="secao-label">obras</div>
  <div class="contador" id="contador">1 / 20</div>

  <div class="obra-container">
    <div class="obra-wrapper" id="obra-wrapper">
      <img class="obra-img" id="obra-img" src="">
      <div class="obra-info">
        <div class="titulo" id="info-titulo"></div>
        <div class="ano" id="info-ano"></div>
        <div class="descricao" id="info-descricao"></div>
      </div>
    </div>
  </div>

  <button class="btn btn-prev" onclick="mudar(-1)">←</button>
  <button class="btn btn-next" onclick="mudar(1)">→</button>

  <script>
    const obras = [
      { src: '1_paisagem_macia.jpg', titulo: 'Paisagem Macia', ano: '2024', descricao: 'Escultura macia. Seda tingida, fios de algodão, fios de poliéster, enchimento de fibra de silicone\n10cm × 100cm × 100cm' },
      { src: '2_paisagem_crua.jpg', titulo: 'Paisagem Crua', ano: '2018–2026', descricao: 'Mokume Shibori sem tingir, tecido misto de algodão com linho, linha de algodão\n78cm × 60cm × 6cm' },
      { src: '3_senhora_sol.jpg', titulo: 'Senhora Sol! Não Desapareça!', ano: '2025', descricao: 'Tecido de seda tingido, linha de algodão, linha de poliéster, enchimento de fibra siliconada\n70cm × 25cm × 60cm' },
      { src: '4_fortuna.jpg', titulo: 'Estudo em Rosa, Vermelho e Amarelo (Fortuna)', ano: '2026', descricao: 'Uchikabi (papel amarelo que representa dinheiro do "outro mundo" em Okinawa) sobre seda tingida\n27,5cm × 38cm' },
      { src: '5_5_amarras.jpg', titulo: '5 Amarras (Rosa e Laranja)', ano: '2025', descricao: 'Seda tingida, seda crua, fios de algodão\n63cm × 2cm × 42cm' },
      { src: '6_mixirica_com_mochi.jpg', titulo: 'Mixirica com Mochi', ano: '2023', descricao: 'Seda crua, seda tingida, algodão, linho, fios de algodão, arroz glutinoso\n12cm × 12cm × 13cm' },
      { src: '7_10_mochis.jpg', titulo: '10 Mochis', ano: '2025', descricao: 'Quilt em seda crua, enchimento de fibra de silicone, fios de algodão\n23cm × 2cm × 23cm' },
      { src: '8_sacola.jpg', titulo: 'Sacola', ano: '2026', descricao: 'Quilt bordado à máquina sobre sacola de algodão, linha de algodão, manta acrílica\n78cm × 60cm × 6cm' },
      { src: '9_casquinha_i.jpg', titulo: 'Casquinha I', ano: '2025', descricao: 'Casca de mexerica seca\n12cm × 8cm × 4,5cm' },
      { src: '10_casquinha_vii.jpg', titulo: 'Casquinha VII', ano: '2025', descricao: 'Casca de mexerica seca, linha de pipa\n13cm × 10cm × 3,5cm' },
      { src: '11_casquinha_xi.jpg', titulo: 'Casquinha XI', ano: '2025', descricao: 'Óleo sobre casca de mexerica seca\n8cm × 6cm × 4cm' },
      { src: '12_estudo_para_casca_de_mexerica.jpg', titulo: 'Estudo para Casca de Mexerica', ano: '2024', descricao: 'Linho sobre seda, alfinetes de metal\n58cm × 26cm' },
      { src: '13_estudo_para_casca_em_textil_ii.jpg', titulo: 'Estudo para Casca de Mexerica II', ano: '2025', descricao: 'Algodão tingido bordado sobre seda tingida, linhas de algodão\n20cm × 27cm' },
      { src: '14_estudo_para_casca_em_textil_iv.jpg', titulo: 'Estudo para Cascas de Mexerica IV', ano: '2025', descricao: 'Seda texturizada bordada sobre seda tingida, linhas de algodão\n26,5cm × 41cm' },
      { src: '15_chororo.jpg', titulo: 'Chororô', ano: '2024', descricao: 'Seda crua, seda tingida, bordado, miçangas, linha de nylon, manta acrílica\n33cm × 4cm × 30cm' },
      { src: '16_prova_do_real.jpg', titulo: 'Prova do Real', ano: '2026', descricao: 'Mãos em algodão tingido, bordado e manta acrílica, turmalinas negras sobre base macia de seda tingida e manta acrílica\n19cm × 19cm × 19cm' },
      { src: '17_amor_furioso.jpg', titulo: 'Amor Furioso', ano: '2017', descricao: 'Katazome (tingimento com pasta de arroz), índigo fresco sobre seda\n40cm × 40cm' },
      { src: '18_minha_pedra_macia.jpg', titulo: 'Minha Pedra Macia', ano: '2025', descricao: 'Óleo, bastão à óleo e medium de cera de abelha sobre tela\n10cm × 15cm' },
      { src: '19_mochi.jpg', titulo: 'Mochi', ano: '2026', descricao: 'Óleo e bastão de óleo sobre tela\n20cm × 25cm' },
      { src: '20_13_mochis.jpg', titulo: '13 Mochis', ano: '2025', descricao: 'Óleo e bastão de óleo sobre tela\n22cm × 16cm' },
    ];

    let atual = 0;

    function mostrar(index) {
      const img = document.getElementById('obra-img');
      const contador = document.getElementById('contador');
      const infoTitulo = document.getElementById('info-titulo');
      const infoAno = document.getElementById('info-ano');
      const infoDescricao = document.getElementById('info-descricao');

      img.classList.remove('visivel');

      setTimeout(() => {
        const obra = obras[index];
        img.src = obra.src;
        infoTitulo.textContent = obra.titulo;
        infoAno.textContent = obra.ano;
        infoDescricao.textContent = obra.descricao;
        contador.textContent = (index + 1) + ' / ' + obras.length;
        img.onload = () => {
          img.classList.add('visivel');
        };
      }, 300);
    }

    function mudar(direcao) {
      atual = (atual + direcao + obras.length) % obras.length;
      mostrar(atual);
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') mudar(1);
      if (e.key === 'ArrowLeft') mudar(-1);
    });

    mostrar(0);
  </script>

</body>
</html>
