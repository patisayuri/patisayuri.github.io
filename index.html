<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pati Sayuri</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      height: 100vh;
      background-image: url('obra_00_vazio2.jpg');
      background-size: cover;
      background-position: center;
      font-family: Georgia, serif;
    }
    .nome {
      position: absolute;
      top: 32px;
      left: 40px;
      font-size: 18px;
      color: #3D2B1A;
      letter-spacing: 0.05em;
    }
    .menu {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .menu a {
      font-size: 32px;
      text-decoration: none;
      letter-spacing: 0.08em;
      transition: opacity 0.2s;
    }
    .menu a:hover { opacity: 0.6; }
    .obras { color: #D4607A; }
    .bio { color: #5B8BAD; }
    .cv { color: #C8A832; }
    .contato { color: #4A7C5A; }
  </style>
</head>
<body>
  <div class="nome">Pati Sayuri</div>
  <div class="menu">
    <a href="obras.html" class="obras">obras</a>
    <a href="bio.html" class="bio">bio</a>
    <a href="cv.html" class="cv">cv</a>
    <a href="contato.html" class="contato">contato</a>
  </div>
</body>
</html>
